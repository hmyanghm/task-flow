<!-- Open this file in a browser to generate PWA icons, then save them as icon-192.png and icon-512.png -->
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  // Background
  ctx.fillStyle = '#0F172A';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, size * 0.2);
  ctx.fill();
  // T letter
  ctx.fillStyle = '#3B82F6';
  ctx.font = `bold ${size * 0.55}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('TF', size/2, size/2 + size*0.02);
}
drawIcon(document.getElementById('c192'), 192);
drawIcon(document.getElementById('c512'), 512);
</script>
